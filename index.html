<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mapa de Regulação SES-MT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:linear-gradient(135deg,#1e3a5f 0%,#2d6a9f 100%);padding:10px 20px;display:flex;align-items:center;gap:15px;box-shadow:0 2px 10px rgba(0,0,0,.5);z-index:1000;flex-shrink:0}
header img{height:50px}
.header-text h1{font-size:1.2rem;font-weight:700;color:#fff}
.header-text p{font-size:.75rem;color:#94b8d6}
.main-container{display:flex;flex:1;overflow:hidden}
#map{flex:1;z-index:1}
.sidebar{width:380px;background:#1e293b;overflow-y:auto;display:flex;flex-direction:column;border-left:1px solid #334155;z-index:100}
.filter-panel{padding:15px;border-bottom:1px solid #334155;background:#162032}
.filter-panel h3{font-size:.85rem;color:#60a5fa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.filter-group{margin-bottom:10px}
.filter-group label{display:block;font-size:.75rem;color:#94a3b8;margin-bottom:4px}
.filter-group select{width:100%;padding:7px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:.8rem;cursor:pointer}
.filter-group select:focus{outline:none;border-color:#3b82f6}
.stats-bar{display:flex;gap:8px;padding:12px 15px;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap}
.stat-card{flex:1;min-width:80px;background:#0f172a;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid #334155}
.stat-card .value{font-size:1.3rem;font-weight:700;color:#60a5fa}
.stat-card .label{font-size:.65rem;color:#64748b;text-transform:uppercase}
.hospitals-list{flex:1;overflow-y:auto;padding:10px}
.hospital-card{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.hospital-card:hover{border-color:#3b82f6;background:#1e293b;transform:translateY(-1px)}
.hospital-card.selected{border-color:#60a5fa;background:#1e3a5f}
.hospital-card h4{font-size:.82rem;font-weight:600;color:#e2e8f0;margin-bottom:6px;line-height:1.3}
.hospital-card .meta{display:flex;flex-wrap:wrap;gap:4px}
.badge{font-size:.65rem;padding:2px 7px;border-radius:12px;font-weight:500}
.badge-regional{background:#1e3a5f;color:#60a5fa;border:1px solid #2d6a9f}
.badge-porte{background:#1a2e1a;color:#4ade80;border:1px solid #166534}
.badge-tipo{background:#2d1a3d;color:#c084fc;border:1px solid #7c3aed}
.badge-leitos{background:#2d2a0e;color:#fbbf24;border:1px solid #92400e}
.hospital-card .regulacao{margin-top:8px;font-size:.7rem;color:#94a3b8}
.hospital-card .regulacao strong{color:#60a5fa}
.detail-panel{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #3b82f6;border-radius:12px;padding:20px;width:500px;max-width:90vw;z-index:1000;box-shadow:0 20px 60px rgba(0,0,0,.8);display:none}
.detail-panel.visible{display:block}
.detail-panel h3{font-size:1rem;color:#60a5fa;margin-bottom:12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.detail-item label{display:block;font-size:.65rem;color:#64748b;text-transform:uppercase}
.detail-item span{font-size:.82rem;color:#e2e8f0;font-weight:500}
.regulacao-matrix{margin-top:10px}
.regulacao-matrix h4{font-size:.75rem;color:#94a3b8;margin-bottom:6px}
.matrix-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.matrix-cell{background:#0f172a;border-radius:6px;padding:6px;text-align:center;border:1px solid #334155}
.matrix-cell .esp{font-size:.6rem;color:#64748b;margin-bottom:2px}
.matrix-cell .nivel{font-size:.75rem;font-weight:700}
.nivel-1{color:#4ade80}
.nivel-2{color:#fbbf24}
.nivel-3{color:#f87171}
.nivel-nc{color:#64748b}
.close-btn{position:absolute;top:10px;right:12px;background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer;line-height:1}
.close-btn:hover{color:#e2e8f0}
.leaflet-popup-content-wrapper{background:#1e293b;border:1px solid #334155;border-radius:10px;color:#e2e8f0}
.leaflet-popup-tip{background:#1e293b}
.popup-title{font-size:.9rem;font-weight:700;color:#60a5fa;margin-bottom:6px}
.popup-info{font-size:.75rem;color:#94a3b8;line-height:1.6}
.popup-info strong{color:#e2e8f0}
.search-box{padding:10px 15px;border-bottom:1px solid #334155}
.search-box input{width:100%;padding:8px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.8rem}
.search-box input::placeholder{color:#475569}
.search-box input:focus{outline:none;border-color:#3b82f6}
.legend{position:absolute;bottom:30px;right:400px;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 15px;z-index:500;font-size:.72rem}
.legend h4{color:#60a5fa;margin-bottom:8px;font-size:.75rem}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;color:#94a3b8}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
</style>
</head>

<header>
<div class="header-text">
<h1>🏥 Mapa de Regulação Assistencial — SES-MT</h1>
<p>Sistema Estadual de Regulação | Mato Grosso | 16 Regionais de Saúde</p>
</div>
</header>
<div class="main-container">
<div id="map"></div>
<div class="sidebar">
<div class="filter-panel">
<h3>🔍 Filtros</h3>
<div class="filter-group">
<label>Regional de Saúde</label>
<select id="filtroRegional" onchange="aplicarFiltros()">
<option value="">Todas as Regionais</option>
</select>
</div>
<div class="filter-group">
<label>Tipo de Unidade</label>
<select id="filtroTipo" onchange="aplicarFiltros()">
<option value="">Todos os Tipos</option>
<option value="Hospital Geral">Hospital Geral</option>
<option value="Hospital Especializado">Hospital Especializado</option>
<option value="UPA">UPA</option>
<option value="Santa Casa">Santa Casa</option>
<option value="Hospital Universitário">Hospital Universitário</option>
<option value="Hospital Municipal">Hospital Municipal</option>
<option value="Maternidade">Maternidade</option>
</select>
</div>
<div class="filter-group">
<label>Porte</label>
<select id="filtroPorte" onchange="aplicarFiltros()">
<option value="">Todos os Portes</option>
<option value="Grande">Grande (200+ leitos)</option>
<option value="Médio">Médio (50-199 leitos)</option>
<option value="Pequeno">Pequeno (&lt;50 leitos)</option>
</select>
</div>
<div class="filter-group">
<label>Especialidade Regulada</label>
<select id="filtroEspecialidade" onchange="aplicarFiltros()">
<option value="">Todas as Especialidades</option>
<option value="UTI Adulto">UTI Adulto</option>
<option value="UTI Neonatal">UTI Neonatal</option>
<option value="Cardiologia">Cardiologia</option>
<option value="Neurologia">Neurologia</option>
<option value="Oncologia">Oncologia</option>
<option value="Ortopedia">Ortopedia</option>
<option value="Obstetrícia">Obstetrícia</option>
<option value="Pediatria">Pediatria</option>
<option value="Trauma">Trauma</option>
<option value="Queimados">Queimados</option>
</select>
</div>
</div>
<div class="search-box">
<input type="text" id="busca" placeholder="🔎 Buscar unidade..." oninput="aplicarFiltros()">
</div>
<div class="stats-bar">
<div class="stat-card"><div class="value" id="totalUnidades">0</div><div class="label">Unidades</div></div>
<div class="stat-card"><div class="value" id="totalLeitos">0</div><div class="label">Leitos</div></div>
<div class="stat-card"><div class="value" id="totalRegionais">0</div><div class="label">Regionais</div></div>
</div>
<div class="hospitals-list" id="hospitalsList"></div>
</div>
</div>
<div class="legend">
<h4>Legenda — Porte</h4>
<div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Grande (200+ leitos)</div>
<div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Médio (50-199 leitos)</div>
<div class="legend-item"><div class="legend-dot" style="background:#eab308"></div>Pequeno (&lt;50 leitos)</div>
</div>

];

const corPorPorte = {
  'Grande': '#ef4444',
  'Médio': '#f97316',
  'Pequeno': '#eab308'
};

let marcadores = [];
let hospitalSelecionado = null;
let mapaFiltrado = [...hospitais];

const map = L.map('map', {
  center: [-13.5, -55.5],
  zoom: 6,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

function criarIcone(hospital) {
  const cor = corPorPorte[hospital.porte] || '#64748b';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z" fill="${cor}" stroke="white" stroke-width="2"/>
    <text x="14" y="19" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">+</text>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -36],
    className: ''
  });
}

function nivelLabel(n) {
  const map = {'N1':'Nível 1','N2':'Nível 2','N3':'Nível 3','NC':'Não Credenciado'};
  return map[n] || n;
}

function nivelClass(n) {
  const map = {'N1':'nivel-1','N2':'nivel-2','N3':'nivel-3','NC':'nivel-nc'};
  return map[n] || 'nivel-nc';
}

function renderizarMarcadores() {
  marcadores.forEach(m => map.removeLayer(m));
  marcadores = [];
  mapaFiltrado.forEach(h => {
    const marker = L.marker([h.lat, h.lng], {icon: criarIcone(h)})
      .addTo(map)
      .bindPopup(`
        <div class="popup-title">${h.nome}</div>
        <div class="popup-info">
          <strong>Município:</strong> ${h.municipio}<br>
          <strong>Regional:</strong> ${h.regional}<br>
          <strong>Tipo:</strong> ${h.tipo}<br>
          <strong>Porte:</strong> ${h.porte}<br>
          <strong>Leitos:</strong> ${h.leitos}
        </div>
      `, {maxWidth: 280});
    marker.on('click', () => selecionarHospital(h));
    marcadores.push(marker);
  });
}

function selecionarHospital(h) {
  hospitalSelecionado = h;
  document.querySelectorAll('.hospital-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-id="${h.id}"]`);
  if (card) {
    card.classList.add('selected');
    card.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  map.setView([h.lat, h.lng], 11, {animate: true});
}

function renderizarSidebar() {
  const lista = document.getElementById('hospitalsList');
  const totalU = document.getElementById('totalUnidades');
  const totalL = document.getElementById('totalLeitos');
  const totalR = document.getElementById('totalRegionais');
  totalU.textContent = mapaFiltrado.length;
  totalL.textContent = mapaFiltrado.reduce((s,h) => s + h.leitos, 0).toLocaleString('pt-BR');
  const regionais = new Set(mapaFiltrado.map(h => h.regional));
  totalR.textContent = regionais.size;
  lista.innerHTML = mapaFiltrado.map(h => {
    const esps = Object.entries(h.regulacao).filter(([,v]) => v !== 'NC').map(([k,v]) => `<span class="badge badge-${v.toLowerCase()}" style="background:#1a2e1a;color:#4ade80;border:1px solid #166534;font-size:.6rem;padding:1px 5px;border-radius:8px">${k}: ${v}</span>`).join(' ');
    return `<div class="hospital-card" data-id="${h.id}" onclick="selecionarHospital(hospitais.find(x=>x.id===${h.id}))">
      <h4>${h.nome}</h4>
      <div class="meta">
        <span class="badge badge-regional">${h.regional.split('—')[0].trim()}</span>
        <span class="badge badge-porte">${h.porte}</span>
        <span class="badge badge-tipo">${h.tipo}</span>
        <span class="badge badge-leitos">${h.leitos} leitos</span>
      </div>
      ${esps ? `<div class="regulacao" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">${esps}</div>` : ''}
    </div>`;
  }).join('');
}

function populaFiltroRegional() {
  const sel = document.getElementById('filtroRegional');
  const regionais = [...new Set(hospitais.map(h => h.regional))].sort();
  regionais.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = r;
    sel.appendChild(opt);
  });
}

function aplicarFiltros() {
  const regional = document.getElementById('filtroRegional').value;
  const tipo = document.getElementById('filtroTipo').value;
  const porte = document.getElementById('filtroPorte').value;
  const esp = document.getElementById('filtroEspecialidade').value;
  const busca = document.getElementById('busca').value.toLowerCase();
  mapaFiltrado = hospitais.filter(h => {
    if (regional && h.regional !== regional) return false;
    if (tipo && h.tipo !== tipo) return false;
    if (porte && h.porte !== porte) return false;
    if (esp && h.regulacao[esp] === 'NC') return false;
    if (busca && !h.nome.toLowerCase().includes(busca) && !h.municipio.toLowerCase().includes(busca)) return false;
    return true;
  });
  renderizarSidebar();
  renderizarMarcadores();
}

populaFiltroRegional();
renderizarSidebar();
renderizarMarcadores();
</script>
